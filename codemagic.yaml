workflows:

  # ─────────────────────────────────────────────
  # iOS IPA build (PRIORITY)
  # Uses Apple ID + App-Specific Password
  # Set in Codemagic → App → Environment Variables:
  #   CM_APPLE_ID            = your Apple ID email
  #   CM_APPLE_APP_SPECIFIC_PASSWORD = app-specific password from appleid.apple.com
  # ─────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 18.20.4
      ios_signing:
        distribution_type: development
        bundle_identifier: space.manus.flight.hours.tracker.t20260120194129
      vars:
        BUNDLE_ID: space.manus.flight.hours.tracker.t20260120194129

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9.12.0

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo prebuild (iOS)
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/FlightHoursTracker.xcworkspace" \
            --scheme "FlightHoursTracker"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18.20.4

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9.12.0

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true
