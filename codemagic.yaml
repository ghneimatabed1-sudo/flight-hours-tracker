workflows:

  # ─────────────────────────────────────────────
  # iOS IPA build (unsigned — no Apple account needed)
  # Install on device via Sideloadly or AltStore
  # ─────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 18.20.4
      vars:
        BUNDLE_ID: space.manus.flight.hours.tracker.t20260120194129

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios --clean
          echo "=== iOS folder after prebuild ==="
          ls -la ios/ || echo "No ios folder!"
          ls ios/*.xcworkspace 2>/dev/null || echo "No xcworkspace found!"

      - name: Build unsigned IPA
        script: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" 2>/dev/null | head -1)
          SCHEME="FlightHoursTracker"
          DERIVED="$HOME/DerivedData"
          ARCHIVE="$HOME/FlightHoursTracker.xcarchive"
          echo "Workspace=$WORKSPACE Scheme=$SCHEME Derived=$DERIVED"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE" \
            -derivedDataPath "$DERIVED" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO > "$HOME/xbuild.log" 2>&1
          BUILD_EXIT=$?
          tail -5 "$HOME/xbuild.log"
          echo "xcodebuild exit code: $BUILD_EXIT"

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "xcodebuild archive FAILED"
            exit 1
          fi

          APP=$(find "$ARCHIVE/Products/Applications" -maxdepth 1 -name "*.app" -type d 2>/dev/null | head -1)
          echo "APP=[$APP]"
          if [ -z "$APP" ]; then
            echo "Archive products:"
            find "$ARCHIVE" -name "*.app" -type d 2>/dev/null
            echo "DerivedData products:"
            find "$DERIVED/Build/Products" -maxdepth 2 -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          mkdir -p "$HOME/Payload"
          cp -r "$APP" "$HOME/Payload/"
          cd "$HOME" && zip -r FlightHoursTracker.ipa Payload/
          ls -lh "$HOME/FlightHoursTracker.ipa"

    artifacts:
      - $HOME/FlightHoursTracker.ipa
      - $HOME/xbuild.log

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18.20.4

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true
