workflows:

  # ─────────────────────────────────────────────
  # iOS IPA build (unsigned — no Apple account needed)
  # Install on device via Sideloadly or AltStore
  # ─────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 18.20.4
      vars:
        BUNDLE_ID: space.manus.flight.hours.tracker.t20260120194129

    scripts:
      - name: Install dependencies
        script: |
          npm install -g pnpm || true
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios --clean --no-install
          cd ios && pod install

      - name: Detect scheme
        script: |
          SCHEME=$(xcodebuild -workspace ios/*.xcworkspace -list 2>/dev/null | grep -A 10 "Schemes:" | grep -v "Schemes:" | head -1 | xargs)
          echo "Detected scheme: $SCHEME"
          echo "XCODE_SCHEME=$SCHEME" >> $CM_ENV

      - name: Build unsigned IPA
        script: |
          WORKSPACE=$(ls ios/*.xcworkspace | head -1)
          echo "Building workspace: $WORKSPACE with scheme: $XCODE_SCHEME"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            | xcpretty

          # Package into unsigned IPA
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$CM_BUILD_DIR/App.xcarchive/Products/Applications/"*.app "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR" && zip -r FlightHoursTracker.ipa Payload/
          echo "IPA created at: $CM_BUILD_DIR/FlightHoursTracker.ipa"

    artifacts:
      - $CM_BUILD_DIR/FlightHoursTracker.ipa

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18.20.4

    scripts:
      - name: Install dependencies
        script: |
          npm install -g pnpm || true
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true
