workflows:

  # ─────────────────────────────────────────────
  # iOS IPA build (unsigned — no Apple account needed)
  # Install on device via Sideloadly or AltStore
  # ─────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 18.20.4
      vars:
        BUNDLE_ID: space.manus.flight.hours.tracker.t20260120194129

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        script: |
          set -e
          npx expo prebuild --platform ios --clean
          echo "Prebuild done. iOS folder contents:"
          ls ios/

      - name: Build unsigned IPA
        script: |
          set -e
          WORKSPACE=$(ls ios/*.xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A 20 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO 2>&1

          echo "Archive contents:"
          find "$CM_BUILD_DIR/App.xcarchive" -name "*.app" 2>/dev/null

          APP_PATH=$(find "$CM_BUILD_DIR/App.xcarchive" -name "*.app" -maxdepth 5 | head -1)
          echo "App found at: $APP_PATH"

          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP_PATH" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR" && zip -r FlightHoursTracker.ipa Payload/
          ls -lh FlightHoursTracker.ipa

    artifacts:
      - $CM_BUILD_DIR/FlightHoursTracker.ipa

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18.20.4

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true
