workflows:

  # ─────────────────────────────────────────────
  # iOS IPA build (unsigned — no Apple account needed)
  # Install on device via Sideloadly or AltStore
  # ─────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: 18.20.4
      vars:
        BUNDLE_ID: space.manus.flight.hours.tracker.t20260120194129

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        script: |
          npx expo prebuild --platform ios --clean
          echo "=== iOS folder after prebuild ==="
          ls -la ios/ || echo "No ios folder!"
          ls ios/*.xcworkspace 2>/dev/null || echo "No xcworkspace found!"

      - name: Build unsigned IPA
        script: |
          set -e
          # Must use the CocoaPods workspace (ios/*.xcworkspace), NOT xcodeproj/project.xcworkspace
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No xcworkspace found!"
            ls -la ios/ 2>/dev/null || echo "No ios folder either"
            exit 1
          fi
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>&1 | grep -A 20 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "Workspace: $WORKSPACE  |  Scheme: $SCHEME"

          # Build for device
          BUILD_LOG="$CM_BUILD_DIR/build.log"
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO 2>&1 | tee "$BUILD_LOG" | tail -30

          # Check outcome
          if grep -q "BUILD FAILED" "$BUILD_LOG"; then
            echo "=== XCODEBUILD FAILED - last 100 lines ==="
            tail -100 "$BUILD_LOG"
            exit 1
          fi

          APP=$(find "$CM_BUILD_DIR/DerivedData/Build/Products" -name "*.app" -maxdepth 3 | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found in DerivedData"
            find "$CM_BUILD_DIR/DerivedData/Build" -maxdepth 4 2>/dev/null
            exit 1
          fi
          echo "App: $APP"

          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$APP" "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR" && zip -r FlightHoursTracker.ipa Payload/
          ls -lh FlightHoursTracker.ipa

    artifacts:
      - $CM_BUILD_DIR/FlightHoursTracker.ipa
      - $CM_BUILD_DIR/build.log

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18.20.4

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true
