workflows:

  # ─────────────────────────────────────────────
  # iOS IPA build (PRIORITY)
  # Uses Apple ID + App-Specific Password
  # Set in Codemagic → App → Environment Variables:
  #   CM_APPLE_ID            = your Apple ID email
  #   CM_APPLE_APP_SPECIFIC_PASSWORD = app-specific password from appleid.apple.com
  # ─────────────────────────────────────────────
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 18.20.4
      vars:
        BUNDLE_ID: space.manus.flight.hours.tracker.t20260120194129

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9.12.0

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo prebuild (iOS)
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build unsigned IPA
        script: |
          # Build without code signing
          xcodebuild archive \
            -workspace ios/FlightHoursTracker.xcworkspace \
            -scheme FlightHoursTracker \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/FlightHoursTracker.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -allowProvisioningUpdates

          # Package .xcarchive into unsigned .ipa
          mkdir -p "$CM_BUILD_DIR/Payload"
          cp -r "$CM_BUILD_DIR/FlightHoursTracker.xcarchive/Products/Applications/FlightHoursTracker.app" \
            "$CM_BUILD_DIR/Payload/"
          cd "$CM_BUILD_DIR"
          zip -r FlightHoursTracker.ipa Payload/

    artifacts:
      - $CM_BUILD_DIR/FlightHoursTracker.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 18.20.4

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9.12.0

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo prebuild (Android)
        script: npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - ghneimatabed1@icloud.com
        notify:
          success: true
          failure: true
